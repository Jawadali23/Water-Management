<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Water Management System – Dawlance</title>
  <!-- CONNECT TO CSS FILE -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Rajdhani:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
</head>

<body>
  <div class="app">
    <!-- ═══ SIDEBAR ═══ -->
    <div class="sb">
      <div class="sb-head">
        <div class="sb-logo-row">
          <!-- NEW RED LOGO URL INSERTED HERE -->
          <div class="sb-logo-icon">
            <img src="images.png" alt="Dawlance Logo">
          </div>
          <span class="sb-logo-txt">DAWLANCE</span>
        </div>
      </div>
      <div class="sb-nav">
        <div class="nav-item active" id="nav-dpl1" onclick="switchView('dpl1',this)">
          <div class="nav-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M12 3.5c0 0-5.5 5.8-5.5 10a5.5 5.5 0 0 0 11 0c0-4.2-5.5-10-5.5-10z" />
              <path d="M9.5 15.5c.6 1.1 1.5 1.7 2.9 1.7" />
            </svg>
          </div>
          <span class="nav-name">DPL 1</span>
        </div>
        <div class="nav-item" id="nav-dpl2" onclick="switchView('dpl2',this)">
          <div class="nav-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M3 21h18" />
              <rect x="5" y="9" width="4" height="12" rx="0.5" />
              <rect x="10" y="6" width="4" height="15" rx="0.5" />
              <rect x="15" y="12" width="4" height="9" rx="0.5" />
            </svg>
          </div>
          <span class="nav-name">DPL 2</span>
        </div>
        <div class="nav-item" id="nav-uril" onclick="switchView('uril',this)">
          <div class="nav-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round"
              stroke-linejoin="round">
              <ellipse cx="12" cy="5" rx="9" ry="3" />
              <path d="M3 5v4.5c0 1.66 4 3 9 3s9-1.34 9-3V5" />
              <path d="M3 9.5v4.5c0 1.66 4 3 9 3s9-1.34 9-3V9.5" />
              <path d="M3 14v4.5c0 1.66 4 3 9 3s9-1.34 9-3V14" />
            </svg>
          </div>
          <span class="nav-name">URIL</span>
        </div>
        <div class="nav-item" id="nav-review" onclick="switchView('review',this)">
          <div class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 3h6l1 2h3v16H5V5h3l1-2z" />
              <path d="M9 12l2 2 4-5" />
              <path d="M8 18h8" />
            </svg></div>
          <span class="nav-name">Review</span>
        </div>
      </div>
      <div class="sb-foot">
        <div class="sb-online">
          <div class="pulse"></div>
          <div class="sb-online-txt"><strong>System Online</strong><span>All meters reporting</span></div>
        </div>
      </div>
    </div>
    <!-- ═══ MAIN ═══ -->
    <div class="main-wrap">
      <div class="topbar">
        <button class="sb-toggle" onclick="toggleSidebar()">&#9776;</button>
        <div class="tb-page-title" id="page-title">DPL 1</div>
        <div class="tb-wms">Water Management System</div>
        <div class="tb-spacer"></div>
        <div class="period-grp">
          <button class="pbtn active" onclick="setPeriod('td',this)">Till Today</button>
          <button class="pbtn" onclick="setPeriod('mtd',this)">MTD</button>
          <button class="pbtn" onclick="setPeriod('ytd',this)">YTD</button>
        </div>

      </div>
      <div class="content">
        <div class="global-filter" id="global-filter">
          <div class="gf-range">
            <div class="gf-field">
              <label class="gf-label">From</label>
              <input class="gf-input" id="from-date" type="date">
            </div>
            <div class="gf-field">
              <label class="gf-label">To</label>
              <input class="gf-input" id="to-date" type="date">
            </div>
            <button class="gf-btn" onclick="applyGlobalFilter()">Apply</button>
            <button class="gf-btn reset" onclick="resetGlobalFilter()">Reset</button>
          </div>

          <div class="manual-meter-container manual-excel-panel">
            <div class="manual-excel-body">
              <div class="manual-excel-actions">
                <button id="openExcelBtn" class="manual-btn">📄 Open Excel file</button>
              </div>
            </div>

          </div>
        </div>

        <!-- ══ DPL 1 ══ -->
        <div class="view active" id="view-dpl1"></div>

        <!-- ══ DPL 2 ══ -->
        <div class="view" id="view-dpl2"></div>

        <!-- ══ URIL ══ -->
        <div class="view" id="view-uril"></div>

        <!-- ══ REVIEW ══ -->
        <div class="view" id="view-review"></div>
      </div>
    </div>
  </div>
  <script src="config.js"></script>
  <script src="state/data.js"></script>
  <script src="utils/helpers.js"></script>
  <script src="services/api.js"></script>
  <script src="charts/renderers.js"></script>
  <script src="components/ui.js"></script>
  <script src="review_page.js"></script>
  <script src="downloadpdf.js"></script>
  <script src="manual_reading.js"></script>
  <script src="views/dpl1.js"></script>
  <script src="script.js"></script>
</body>
</html>
